name: Release
on:
  push:
    tags:
      - 'v*'
concurrency:
  group: release
  cancel-in-progress: false
permissions: {}
jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 15
    container:
      image: node:24
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
  release:
    needs: ci
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Detect pre-release
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: true
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Determine npm tag
        id: npm-tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRERELEASE="${TAG#v[0-9]*.[0-9]*.[0-9]*-}"
            echo "tag=${PRERELEASE%%[-.]*}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        run: npm publish --provenance --tag ${{ steps.npm-tag.outputs.tag }}
